name: Build & Publish Docker Image

# 构建多架构（linux/amd64 + linux/arm64）镜像并推送到 Docker Hub。
#
# 触发方式：
#   - workflow_dispatch: 手动触发，可选填 upstream_version（如 v10.1.3），
#                        留空则自动取上游最新 release。
#   - workflow_call:     被 check-upstream.yml 调用（定时检查发现新版本时）。
#
# 需要的 Repository Secrets：
#   DOCKERHUB_USERNAME  Docker Hub 账号（即镜像名前缀）
#   DOCKERHUB_TOKEN     Docker Hub Access Token（在 Docker Hub → Account Settings → Security 新建）

on:
  workflow_dispatch:
    inputs:
      upstream_version:
        description: '上游版本号（如 v10.1.3，留空自动取最新）'
        required: false
        type: string
  workflow_call:
    inputs:
      upstream_version:
        required: true
        type: string

# 明文镜像名（按需求放在配置里，不放 secret）
env:
  IMAGE: yangwudong/java_oci_manage
  UPSTREAM_REPO: semicons/java_oci_manage

permissions:
  contents: write   # 用于打 upstream-vX tag 记录已构建版本

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ----------------------------------------------------------------------
      # 1. 解析要构建的上游版本
      # ----------------------------------------------------------------------
      - name: Resolve upstream version
        id: ver
        run: |
          INPUT_VER="${{ inputs.upstream_version }}"
          if [ -n "${INPUT_VER}" ]; then
            VER="${INPUT_VER}"
          else
            # workflow_dispatch 留空时，自动取上游最新 release tag
            VER=$(curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${UPSTREAM_REPO}/releases/latest" \
              | grep -m1 '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
            [ -z "${VER}" ] && { echo "无法获取上游最新版本" >&2; exit 1; }
          fi
          # 规范化：保证带 v 前缀
          case "${VER}" in
            v*) ;;
            *) VER="v${VER}" ;;
          esac
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "已确定构建版本: ${VER}"

      # ----------------------------------------------------------------------
      # 2. 检出本仓库代码
      # ----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------------------
      # 3. Docker Hub 登录（使用 secret，绝不硬编码 token）
      # ----------------------------------------------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ----------------------------------------------------------------------
      # 4. 准备多架构构建环境
      # ----------------------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ----------------------------------------------------------------------
      # 5. 构建并推送（amd64 用 compatible 包，arm64 用 aarch 包，
      #    具体由 Dockerfile 内 TARGETARCH 分支决定）
      # ----------------------------------------------------------------------
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          build-args: |
            UPSTREAM_VERSION=${{ steps.ver.outputs.version }}
          # 同时打版本号 tag 和 latest
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:latest
          push: true
          # 用 GitHub Actions cache 加速重复构建
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------------------------------------
      # 6. 记录已构建的上游版本（打 upstream-vX tag），供 check-upstream.yml 比对。
      #    若 tag 已存在则跳过，避免重复构建循环。
      # ----------------------------------------------------------------------
      - name: Tag built version
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          TAG="upstream-${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} 已存在，跳过"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" "${TAG}"
          echo "已打 tag ${TAG}"

      - name: Summary
        run: |
          echo "### 构建完成 ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像: \`${IMAGE}:${{ steps.ver.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 架构: linux/amd64, linux/arm64" >> "$GITHUB_STEP_SUMMARY"
          echo "- 上游版本: ${{ steps.ver.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
