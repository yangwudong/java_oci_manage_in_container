# docker-compose 示例 — java_oci_manage (R-Bot 客户端)
#
# 挂载方式：整个宿主目录挂到 /app（推荐，比单文件挂载更省事）。
# 二进制在 /opt/rbot（镜像内置），挂载盖不到它。
#
# 目录结构准备（在 compose 文件同级目录）：
#   ./config/
#   ├── client_config          # 你的配置文件
#   └── <私钥>.pem             # OCI API 私钥（不是 .cer 公钥证书）
#
# client_config 里 key_file 写容器内路径，例如：
#   key_file=/app/your-private-key.pem
#
# 用法：
#   1. 按👆准备 ./config/ 目录
#   2. docker compose up -d
#   3. 首次启动会在 /app 生成 data/、.task/ 等，并打印登录凭据

services:
  oracle_oci:
    image: yangwudong/java_oci_manage:latest
    container_name: Oracle_OCI
    restart: unless-stopped
    ports:
      - "9527:9527"
    volumes:
      # 挂整个目录：client_config + 私钥 + 运行时数据都在这里
      - "./config:/app"
    environment:
      - TZ=Asia/Shanghai
      # - MODEL=local   # 默认就是 local(无公网IP模式)。想用端口模式写 MODEL=(留空)
    # healthcheck 已内置在镜像，群晖上会显示 healthy
